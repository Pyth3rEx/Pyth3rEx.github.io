default: true

# Line length — allow longer lines (URLs, tables, list items)
MD013:
  line_length: 160
  code_blocks: false
  tables: false
  headings: false

# Inline HTML — allowed (Jekyll front matter, custom elements)
MD033: false

# First line heading — not required (posts use front matter title)
MD041: false

# Ordered list style — allow any
MD029: false

# Multiple h1 headings — intentional section structure
MD025: false

# Emphasis as heading — bold used for stylistic effect, not structure
MD036: false