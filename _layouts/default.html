<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="index, follow">
  <meta name="author" content="{{ page.author | default: site.author }}">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% if page.tags and page.tags.size > 0 %}
  <meta name="keywords" content="{{ page.tags | join: ', ' }}">
  {% endif %}
  {% feed_meta %}
  {% seo %}
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="{{ '/blog' | relative_url }}">[blog]</a>
        <a href="{{ '/about' | relative_url }}">[about]</a>
      </nav>
    </div>
  </header>

  <main class="site-main">
    <div class="content-wrapper">
      {{ content }}
    </div>
  </main>

  <button class="back-to-top" id="back-to-top" aria-label="Back to top">↑</button>

  <script>
    document.querySelectorAll('div.highlight').forEach(function(block) {
      var btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.textContent = 'copy';
      block.style.position = 'relative';
      block.appendChild(btn);
      btn.addEventListener('click', function() {
        var code = block.querySelector('code') || block.querySelector('pre');
        navigator.clipboard.writeText(code.innerText).then(function() {
          btn.textContent = 'copied';
          setTimeout(function() { btn.textContent = 'copy'; }, 1500);
        });
      });
    });
  </script>

  <script>
    var toc = document.getElementById('post-toc');
    if (toc) {
      var headings = document.querySelectorAll('.post-content h1, .post-content h2');
      if (headings.length > 0) {
        var ul = document.createElement('ul');
        var tocLinks = [];
        headings.forEach(function(h) {
          var li = document.createElement('li');
          li.className = 'toc-' + h.tagName.toLowerCase();
          var a = document.createElement('a');
          a.href = '#' + h.id;
          a.textContent = h.textContent;
          a.dataset.id = h.id;
          li.appendChild(a);
          ul.appendChild(li);
          tocLinks.push(a);
        });
        toc.appendChild(ul);

        function updateActive() {
          var scrollPos = window.scrollY + 80;
          var current = null;
          headings.forEach(function(h) {
            if (h.offsetTop <= scrollPos) current = h.id;
          });
          tocLinks.forEach(function(a) {
            a.classList.toggle('toc-active', a.dataset.id === current);
          });
        }
        window.addEventListener('scroll', updateActive);
        updateActive();
      }
    }

    var backToTop = document.getElementById('back-to-top');
    if (backToTop) {
      window.addEventListener('scroll', function() {
        backToTop.classList.toggle('visible', window.scrollY > 200);
      });
      backToTop.addEventListener('click', function() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    }
  </script>

  <footer class="site-footer">
    <span>&copy; {{ site.time | date: '%Y' }} {{ site.title }}</span>
  </footer>
</body>
</html>
